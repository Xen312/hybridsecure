<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>HybridSecure Chat — Demo</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/libsodium-wrappers@0.7.9/dist/browsers/sodium.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <h1>HybridSecure</h1>
        <div class="tag">Encrypted chat — demo</div>
      </div>
      <div id="signin-area"></div>
    </header>

    <main>
      <aside class="leftpanel">
        <div class="profile">
          <img id="avatar" src="" alt="" class="avatar" />
          <div>
            <div id="displayName" class="displayName">Not signed in</div>
            <div id="displayEmail" class="small muted"></div>
          </div>
        </div>

        <div class="section">
          <label>Display username</label>
          <input id="username" placeholder="choose username" />
          <button id="btnClaim" class="btn">Claim username</button>
        </div>

        <div class="section">
          <label>Search users</label>
          <input id="searchUser" placeholder="search username" />
          <div id="searchResults" class="list"></div>
        </div>

        <div class="section">
          <h3>Contacts</h3>
          <div id="contacts" class="list"></div>
        </div>

        <div class="section">
          <h3>Requests</h3>
          <div id="requests" class="list"></div>
        </div>
      </aside>

      <section class="center">
        <div id="chatsList" class="chatsList"></div>
        <div id="chatWindow" class="chatWindow hidden">
          <div id="chatHeader" class="chatHeader"></div>
          <div id="messages" class="messages"></div>
          <div class="composer">
            <input id="messageInput" placeholder="Type a message..." />
            <button id="sendBtn" class="btn">Send</button>
          </div>
        </div>
        <div id="welcome" class="welcome">
          <h2>Welcome</h2>
          <p>Sign in and claim a username to start.</p>
        </div>
      </section>
    </main>

    <footer>
      <small>Demo app — Google Forms + Google Sheets backend.</small>
    </footer>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
