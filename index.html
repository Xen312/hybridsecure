<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Simple E2E Chat — GitHub Pages</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles.css">
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- libsodium (browser build) -->
  <script src="https://cdn.jsdelivr.net/npm/libsodium-wrappers@0.7.9/dist/modules/libsodium-wrappers.js"></script>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="brand">E2E Chat</div>
      <div id="auth-area">
        <div id="gsi-button"></div>
        <div id="signed-in" class="hidden">
          <div id="profile">
            <div id="profile-name"></div>
            <div id="profile-email"></div>
          </div>
          <div class="auth-actions">
            <button id="exportKeyBtn">Export key</button>
            <button id="importKeyBtn">Import key</button>
            <button id="signOutBtn">Sign out</button>
          </div>
        </div>
      </div>

      <h4>People</h4>
      <div id="users" class="list">Loading users…</div>
      <div class="footer-note">Polling every <span id="pollIntervalDisplay">3s</span>. Messages retained 30 days.</div>
    </aside>

    <main id="main">
      <header id="chat-header">Select a user to chat</header>

      <section id="messages" class="messages"></section>

      <form id="composer" class="composer" onsubmit="return false;">
        <textarea id="messageInput" placeholder="Write a message..." aria-label="Message"></textarea>
        <div class="controls">
          <button id="sendBtn" class="primary">Send</button>
        </div>
      </form>

      <div id="toast" class="toast hidden"></div>
    </main>
  </div>

  <script>
    // Configuration: your Apps Script Web App URL and Google OAuth client ID
    const API_BASE = 'https://script.google.com/macros/s/AKfycbw_Q7_4BXWWENAY4YEwf0fppnda5DQgIV3jZEYgqepcpze07TsdgQlc5ZnCIq7FXObRyQ/exec';
    const GOOGLE_CLIENT_ID = '121678512924-k99oc1lesanufafeojgb0jp3oi5nkvd8.apps.googleusercontent.com';
  </script>

  <script src="app.js"></script>
</body>
</html>
